[workspace]
name = "data-rover"
version = "0.1.0"
description = "Reflective MBSE metamodel engine: a mutable metamodel, a generic model layer, and a pluggable validation pipeline."
authors = ["Mattia Di Pietro <mattia.dipi@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[feature.core.dependencies]
python = "3.14.*"
pydantic = "2.13.*"
pyyaml = "6.0.*"
types-pyyaml = "6.0.*"
sortedcontainers = "2.4.*"

[feature.core-dev.dependencies]
pytest = "9.0.*"
ruff = "0.15.*"
mypy = "1.20.*"

[feature.api.dependencies]
fastapi = "0.115.*"
uvicorn = "0.32.*"
pydantic-settings = "2.6.*"
httpx = "0.27.*"
sqlalchemy = "2.0.*"
alembic = "1.14.*"
psycopg = "3.2.*"
google-cloud-storage = "3.*"
websockets = "15.*"
pyjwt = "2.*"
argon2-cffi = "23.*"
python-multipart = "0.0.*"
openpyxl = "3.1.*"
types-openpyxl = "3.1.*"
xlsxwriter = "3.2.*"
process-compose = "1.*"

[feature.api.pypi-dependencies]
wasmtime = ">=30"

[feature.api.activation]
scripts = ["scripts/ensure_guest.sh"]

[feature.api.tasks.backend-start]
description = "Run the FastAPI backend on 127.0.0.1:8000"
cmd = "uvicorn data_rover.api.main:app --reload --reload-dir src --host 127.0.0.1 --port 8000 --app-dir src"
default-environment = "api"

[feature.api.tasks.db-upgrade]
description = "Apply the Alembic schema"
cmd = "alembic upgrade head"
default-environment = "api"

[feature.api.tasks.db-revision]
description = "Autogenerate a new Alembic migration"
args = [{ arg = "message", default = "migration" }]
cmd = "alembic revision --autogenerate -m \"{{ message }}\""
default-environment = "api"

[feature.api.tasks.services-start]
description = "Start docker infra, wait until ready"
cmd = "docker compose up -d --wait"
default-environment = "api"

[feature.api.tasks.services-stop]
description = "Stop docker infra"
cmd = "docker compose down"
default-environment = "api"

[feature.api.tasks.services-reset]
description = "Stop docker infra and wipe data volumes"
cmd = "docker compose down -v"
default-environment = "api"

[feature.api.tasks.services-logs]
description = "Tail docker infra logs"
cmd = "docker compose logs -f"
default-environment = "api"

[feature.api.tasks.dr-start]
description = "Start the full local stack: docker + migrate + backend + frontend"
cmd = """
docker compose up -d --wait postgres fake-gcs && docker compose up -d gcs-init && docker compose wait gcs-init && bash scripts/pc.sh up --detached
"""
default-environment = "api"

[feature.api.tasks.dr-stop]
description = "Stop the full local stack"
cmd = """
bash scripts/pc.sh down || true
docker compose down
"""
default-environment = "api"

[feature.api.tasks.dr-reset]
description = "Stop the stack and wipe docker volumes for a clean slate"
cmd = """
bash scripts/pc.sh down || true
docker compose down -v
"""
default-environment = "api"

[feature.api.tasks.dr-logs]
description = "Attach the process-compose TUI to the running stack"
cmd = "bash scripts/pc.sh attach"
default-environment = "api"

[feature.core-dev.tasks.core-test]
description = "Run the pytest suite"
cmd = "pytest"
default-environment = "core-dev"

[feature.core-dev.tasks.core-lint]
description = "Lint + typecheck the core package"
args = [{ arg = "check_only", default = "false", choices = ["true", "false"] }]
cmd = """
ruff check {% if check_only == 'false' %}--fix{% endif %} .
mypy .
pyright
"""
cwd = "src/data_rover/core"
default-environment = "core-dev"

[feature.core-dev.tasks.core-format]
description = "Format the core package"
args = [{ arg = "check_only", default = "false", choices = ["true", "false"] }]
cmd = "ruff format {% if check_only == 'true' %}--check{% endif %} ."
cwd = "src/data_rover/core"
default-environment = "core-dev"

[feature.core-dev.tasks.core-tidy]
description = "Format + lint the core package"
args = [{ arg = "check_only", default = "false", choices = ["true", "false"] }]
cmd = "true"
depends-on = [
    { task = "core-format", args = [{ check_only = "{{ check_only }}" }] },
    { task = "core-lint", args = [{ check_only = "{{ check_only }}" }]},
]

[feature.core-dev.tasks.backend-lint]
description = "Lint + typecheck the API package"
args = [{ arg = "check_only", default = "false", choices = ["true", "false"] }]
cmd = """
ruff check {% if check_only == 'false' %}--fix{% endif %} .
mypy .
pyright
"""
cwd = "src/data_rover/api"
default-environment = "core-dev"

[feature.core-dev.tasks.backend-format]
description = "Format the API package"
args = [{ arg = "check_only", default = "false", choices = ["true", "false"] }]
cmd = "ruff format {% if check_only == 'true' %}--check{% endif %} ."
cwd = "src/data_rover/api"
default-environment = "core-dev"

[feature.core-dev.tasks.backend-tidy]
description = "Format + lint the API package"
args = [{ arg = "check_only", default = "false", choices = ["true", "false"] }]
cmd = "true"
depends-on = [
    { task = "backend-format", args = [{ check_only = "{{ check_only }}" }] },
    { task = "backend-lint", args = [{ check_only = "{{ check_only }}" }]},
]

[feature.core-dev.tasks.dr-tidy]
description = "Format + lint the whole codebase"
args = [{ arg = "check_only", default = "false", choices = ["true", "false"] }]
cmd = "true"
default-environment = "core-dev"
depends-on = [
    { task = "frontend-tidy", args = [{ check_only = "{{ check_only }}" }], environment = "frontend" },
    { task = "core-tidy", args = [{ check_only = "{{ check_only }}" }] },
    { task = "backend-tidy", args = [{ check_only = "{{ check_only }}" }] },
]

[feature.frontend.dependencies]
nodejs = "22.*"

[feature.frontend.tasks.frontend-install]
description = "Install frontend npm dependencies"
cmd = "npm install"
cwd = "frontend"

[feature.frontend.tasks.frontend-start]
description = "Run the SvelteKit dev server on :5173"
cmd = "npm run dev"
cwd = "frontend"
depends-on = [{ task = "frontend-install" }]

[feature.frontend.tasks.frontend-build]
description = "Build the frontend for production"
cmd = "npm run build"
cwd = "frontend"

[feature.frontend.tasks.frontend-lint]
description = "Lint + svelte-check the frontend"
args = [{ arg = "check_only", default = "false", choices = ["true", "false"] }]
cmd = """
npx eslint {% if check_only == 'false' %}--fix{% endif %} .
npm run check
"""
cwd = "frontend"

[feature.frontend.tasks.frontend-format]
description = "Format the frontend"
args = [{ arg = "check_only", default = "false", choices = ["true", "false"] }]
cmd = "npx prettier {% if check_only == 'true' %}--check{% else %}--write{% endif %} ."
cwd = "frontend"

[feature.frontend.tasks.frontend-tidy]
description = "Format + lint the frontend"
args = [{ arg = "check_only", default = "false", choices = ["true", "false"] }]
cmd = "true"
depends-on = [
    { task = "frontend-format", args = [{ check_only = "{{ check_only }}" }] },
    { task = "frontend-lint", args = [{ check_only = "{{ check_only }}" }]},
]

[environments]
core = { features = ["core"] }
core-dev = { features = ["core", "core-dev", "api"] }
api = { features = ["core", "api"] }
frontend = { features = ["frontend"] }
